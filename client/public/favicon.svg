<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#050508"/>

  <!-- Outer glow border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#ff6b00" stroke-width="2" opacity="0.6"/>

  <!-- Main circle -->
  <circle cx="50" cy="50" r="40" fill="#0d0d14" stroke="#ff6b00" stroke-width="2"/>

  <!-- Crosshair targeting reticle -->
  <line x1="50" y1="20" x2="50" y2="32" stroke="#ff6b00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="68" x2="50" y2="80" stroke="#ff6b00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="50" x2="32" y2="50" stroke="#ff6b00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="50" x2="80" y2="50" stroke="#ff6b00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center targeting dot -->
  <circle cx="50" cy="50" r="6" fill="#ff6b00"/>

  <!-- Pulsing outer ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" values="40;42;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>